services:
  postgres:
    image: postgres:16-alpine
    container_name: rentsafe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rentsafe_db
      POSTGRES_USER: rentsafe_user
      POSTGRES_PASSWORD: rentsafe_password
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
