name = "rentsafe-ai-be-production"
main = "src/index.ts"
compatibility_date = "2025-03-17"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Hyperdrive for PostgreSQL connection pooling
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "84d544be300d480689904aeafba505f5"

# ============================================================
# Secrets — DO NOT define secrets in this file.
# Set via CLI: wrangler secret put <SECRET_NAME>
#
# Required secrets:
#   - DATABASE_URL
#   - BETTER_AUTH_SECRET
#   - BETTER_AUTH_URL
#   - GOOGLE_CLIENT_ID
#   - GOOGLE_CLIENT_SECRET
#   - R2_PUBLIC_URL
#   - FRONTEND_URLS
#
# For local development, set these in .dev.vars
# ============================================================

# Dev environment uses .dev.vars automatically
[env.development]
# Development-specific overrides if needed

[env.production]
# Production environment config

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
