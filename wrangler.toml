name = "rentsafe-ai-be-production"
main = "src/index.ts"
compatibility_date = "2025-03-17"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Hyperdrive for PostgreSQL connection pooling
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "84d544be300d480689904aeafba505f5"

# Production secrets (set via: wrangler secret put <NAME>)
[[vars]]
DATABASE_URL = { secret = "DATABASE_URL" }

[[vars]]
BETTER_AUTH_SECRET = { secret = "BETTER_AUTH_SECRET" }

[[vars]]
GOOGLE_CLIENT_ID = { secret = "GOOGLE_CLIENT_ID" }

[[vars]]
GOOGLE_CLIENT_SECRET = { secret = "GOOGLE_CLIENT_SECRET" }

[[vars]]
R2_PUBLIC_URL = { secret = "R2_PUBLIC_URL" }

[[vars]]
BETTER_AUTH_URL = { secret = "BETTER_AUTH_URL" }

[[vars]]
FRONTEND_URLS = { secret = "FRONTEND_URLS" }

# Optional: Enable Logpush for observability
# [[logs]]
# destination = "logtail-destination"

# Dev environment uses .dev.vars automatically
[env.development]
# Development-specific overrides if needed

[env.production]
# Production environment config

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
